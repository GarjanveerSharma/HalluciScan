<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>HalluciScan</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      background: #0a0a0f;
      color: #e2e8f0;
      font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
      padding: 20px;
    }
    .logo {
      font-size: 18px;
      font-weight: 800;
      background: linear-gradient(135deg, #8b5cf6, #06b6d4);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 4px;
    }
    .tagline { font-size: 12px; color: #9ca3af; margin-bottom: 20px; }
    .status-card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 12px;
    }
    .status-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 0;
    }
    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      display: inline-block;
      margin-right: 8px;
    }
    .dot-active { background: #10b981; box-shadow: 0 0 8px rgba(16,185,129,0.5); }
    .dot-beta { background: #f59e0b; box-shadow: 0 0 8px rgba(245,158,11,0.5); }
    .status-name { font-size: 13px; font-weight: 600; }
    .status-label { font-size: 11px; color: #9ca3af; }
    .btn {
      display: block;
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(135deg, #8b5cf6, #3b82f6);
      color: white;
      font-weight: 700;
      font-size: 13px;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
    }
    .btn:hover { opacity: 0.9; }
    .version { text-align: center; font-size: 10px; color: #4a5568; margin-top: 12px; }
  </style>
</head>
<body>
  <div class="logo">🛡️ HalluciScan</div>
  <div class="tagline">AI Hallucination Detector</div>

  <div class="status-card">
    <div class="status-row">
      <span><span class="status-dot dot-active"></span><span class="status-name">ChatGPT</span></span>
      <span class="status-label">Active</span>
    </div>
    <div class="status-row">
      <span><span class="status-dot dot-active"></span><span class="status-name">Gemini</span></span>
      <span class="status-label">Active</span>
    </div>
    <div class="status-row">
      <span><span class="status-dot dot-beta"></span><span class="status-name">Claude</span></span>
      <span class="status-label">Beta</span>
    </div>
  </div>

  <a href="http://localhost:3000/analyzer" target="_blank" class="btn">Open Web Analyzer</a>

  <div class="version" id="version-text">v1.0.0</div>

  <script src="popup.js"></script>
</body>
</html>
